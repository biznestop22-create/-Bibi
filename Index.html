<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Now</title>

<style>
body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:url('bg.jpg') no-repeat center center fixed;
  background-size:cover;
}

.overlay {
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  backdrop-filter: blur(12px);
  background: rgba(0,0,0,0.6);
}

.box {
  position:relative;
  z-index:2;
  width:90%;
  max-width:380px;
  margin:80px auto;
  padding:22px;
  border-radius:20px;
  background: rgba(20,20,20,0.75);
  backdrop-filter: blur(20px);
  box-shadow:0 0 30px rgba(0,0,0,0.7);
  color:white;
  text-align:center;
}

.title {
  font-size:22px;
  font-weight:bold;
  margin-bottom:10px;
}

.sub {
  font-size:14px;
  opacity:0.8;
  margin-bottom:20px;
}

.online {
  color:#00ff88;
  font-size:13px;
  margin-bottom:15px;
}

.avatars {
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:20px;
}

.avatars img {
  width:50px;
  height:50px;
  border-radius:50%;
  border:2px solid #fff;
}

.btn {
  width:100%;
  padding:15px;
  font-size:16px;
  border:none;
  border-radius:14px;
  background:linear-gradient(45deg,#ff0033,#ff3366);
  color:white;
  font-weight:bold;
  animation:pulse 1.5s infinite;
}

@keyframes pulse {
  50% { box-shadow:0 0 25px rgba(255,0,80,1); }
}

.footer {
  font-size:12px;
  margin-top:10px;
  opacity:0.6;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="box">

<div class="title">People near you are online now</div>

<div class="sub">See who is available to chat in your area</div>

<div class="online">● 147 people online</div>

<div class="avatars">
  <img src="https://i.imgur.com/1.jpg">
  <img src="https://i.imgur.com/2.jpg">
  <img src="https://i.imgur.com/3.jpg">
</div>

<button class="btn" onclick="go()">View profiles</button>

<div class="footer">18+ only</div>

</div>

<script>
function go(){
  window.location.href="https://t.ajrkmx1.com/407347/6224/17111?bo=2779,2778,2777,2776,2775&po=6533&aff_sub5=SF_006OG000004lmDN";
}
</script>

</body>
</html>
